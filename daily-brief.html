<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>☀️ 每日早报 · 小可爱任务本</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #FFB347 0%, #FF6B9D 50%, #FF8E53 100%);
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(255, 100, 120, 0.35);
      padding: 40px 36px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.7s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 日期区 */
    .date-section { margin-bottom: 24px; }
    .date-weekday {
      font-size: 1rem;
      color: #FF6B9D;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .date-main {
      font-size: 2.8rem;
      font-weight: 800;
      color: #333;
      line-height: 1.1;
      margin: 6px 0 4px;
    }
    .date-year {
      font-size: 1rem;
      color: #888;
    }

    /* 倒计时 */
    .countdown-section {
      background: linear-gradient(135deg, #FF6B9D, #FFB347);
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 24px;
      color: white;
    }
    .countdown-label {
      font-size: 0.85rem;
      opacity: 0.9;
      margin-bottom: 4px;
    }
    .countdown-time {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 2px;
    }
    .countdown-sub {
      font-size: 0.8rem;
      opacity: 0.85;
      margin-top: 4px;
    }

    /* 励志句 */
    .quote-section {
      background: #FFF5F8;
      border-left: 4px solid #FF6B9D;
      border-radius: 0 12px 12px 0;
      padding: 14px 18px;
      margin-bottom: 24px;
      text-align: left;
    }
    .quote-icon { font-size: 1.2rem; }
    .quote-text {
      font-size: 1rem;
      color: #555;
      line-height: 1.6;
      margin-top: 4px;
      font-style: italic;
    }

    /* 今日待办 */
    .tasks-section { margin-bottom: 28px; text-align: left; }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #FF6B9D;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .task-list { list-style: none; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #FFF5F8;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: #444;
    }
    .task-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #FF6B9D;
      flex-shrink: 0;
    }
    .task-priority-high .task-dot { background: #FF4757; }
    .task-priority-medium .task-dot { background: #FFA502; }
    .task-priority-low .task-dot { background: #2ED573; }
    .task-empty {
      text-align: center;
      color: #aaa;
      font-size: 0.95rem;
      padding: 16px;
    }
    .task-count-badge {
      background: #FF6B9D;
      color: white;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    /* 开始按钮 */
    .start-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #FF6B9D, #FFB347);
      color: white;
      font-size: 1.2rem;
      font-weight: 800;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(255, 107, 157, 0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 1px;
    }
    .start-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(255, 107, 157, 0.55);
    }
    .start-btn:active { transform: translateY(0); }

    /* 响应式 */
    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
      .date-main { font-size: 2.2rem; }
      .countdown-time { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- 日期 -->
  <div class="date-section">
    <div class="date-weekday" id="weekday"></div>
    <div class="date-main" id="dateMain"></div>
    <div class="date-year" id="dateYear"></div>
  </div>

  <!-- 倒计时 -->
  <div class="countdown-section">
    <div class="countdown-label">⏰ 距今晚 8:00 截止还剩</div>
    <div class="countdown-time" id="countdown">--:--</div>
    <div class="countdown-sub" id="countdownSub"></div>
  </div>

  <!-- 励志句子 -->
  <div class="quote-section">
    <div class="quote-icon">✨</div>
    <div class="quote-text" id="quoteText"></div>
  </div>

  <!-- 今日待办 -->
  <div class="tasks-section">
    <div class="section-title">
      📋 今日待办
      <span class="task-count-badge" id="taskCountBadge">0</span>
    </div>
    <ul class="task-list" id="taskList">
      <li class="task-empty">正在读取任务数据…</li>
    </ul>
  </div>

  <!-- 开始按钮 -->
  <a href="index.html" class="start-btn">开始今天的任务 →</a>

</div>

<script>
  // ───── 工具函数 ─────
  const WEEKDAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  const MONTHS   = ['一','二','三','四','五','六','七','八','九','十','十一','十二'];

  function pad(n){ return String(n).padStart(2,'0'); }

  // ───── 日期渲染 ─────
  function renderDate(){
    const now = new Date();
    document.getElementById('weekday').textContent = WEEKDAYS[now.getDay()];
    document.getElementById('dateMain').textContent =
      `${now.getMonth()+1}月 ${now.getDate()}日`;
    document.getElementById('dateYear').textContent =
      `${now.getFullYear()} 年`;
  }

  // ───── 倒计时 ─────
  function updateCountdown(){
    const now    = new Date();
    const target = new Date(now);
    target.setHours(20, 0, 0, 0);

    const diff = target - now;

    if(diff <= 0){
      document.getElementById('countdown').textContent = '今日已截止';
      document.getElementById('countdownSub').textContent = '明天继续加油！';
      return;
    }

    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000)   / 1000);

    document.getElementById('countdown').textContent =
      `${pad(h)}:${pad(m)}:${pad(s)}`;

    if(h >= 4){
      document.getElementById('countdownSub').textContent = '时间充裕，从容完成 💪';
    } else if(h >= 1){
      document.getElementById('countdownSub').textContent = '抓紧时间，冲刺一波 🏃';
    } else {
      document.getElementById('countdownSub').textContent = '最后冲刺！你可以的 🔥';
    }
  }

  // ───── 励志句子 ─────
  const QUOTES = [
    '每一个今天都是余生中最年轻的一天，好好珍惜吧！',
    '小步前进，持续行动，时间会给出最好的答案。',
    '不要等待完美的时机，现在就是最好的开始。',
    '完成比完美更重要，先动起来再说。',
    '你今天种下的努力，会在未来某天开花结果。',
    '专注做好眼前的事，其余的交给时间。',
    '哪怕只完成一件事，今天就是值得的一天。',
    '把大任务切成小块，每完成一块都值得鼓励自己。',
    '习惯比动力更可靠，坚持打卡就是在积累财富。',
    '今日事今日毕，明天的你会感谢今天努力的自己。',
  ];

  function renderQuote(){
    const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    document.getElementById('quoteText').textContent = q;
  }

  // ───── 读取今日任务 ─────
  function renderTodayTasks(){
    const listEl  = document.getElementById('taskList');
    const badgeEl = document.getElementById('taskCountBadge');

    // 读取 localStorage —— 兼容主系统的存储 key
    let tasks = [];
    try {
      const raw = localStorage.getItem('tasks') ||
                  localStorage.getItem('todoTasks') ||
                  localStorage.getItem('taskList');
      if(raw) tasks = JSON.parse(raw);
    } catch(e){ tasks = []; }

    // 筛选今天未完成的任务
    const today = new Date();
    today.setHours(0,0,0,0);

    const todayTasks = tasks.filter(t => {
      if(t.completed || t.done || t.status === 'done') return false;
      if(!t.date && !t.dueDate && !t.deadline) return true; // 无日期也显示
      const d = new Date(t.date || t.dueDate || t.deadline);
      d.setHours(0,0,0,0);
      return d <= today; // 今天及过期的都算
    }).slice(0, 8); // 最多显示8条

    badgeEl.textContent = todayTasks.length;

    if(todayTasks.length === 0){
      listEl.innerHTML = '<li class="task-empty">🎉 今日暂无待办，尽情享受！</li>';
      return;
    }

    listEl.innerHTML = todayTasks.map(t => {
      const priority = t.priority || t.level || 'medium';
      const title    = t.title || t.name || t.text || t.content || '未命名任务';
      return `<li class="task-item task-priority-${priority}">
        <span class="task-dot"></span>
        <span>${title}</span>
      </li>`;
    }).join('');
  }

  // ───── 初始化 ─────
  renderDate();
  renderQuote();
  renderTodayTasks();
  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>
</body>
</html>
